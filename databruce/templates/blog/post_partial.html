<div class="row mb-2">
    <span class="text-2xl">
        <a href="{{ post.get_absolute_url }}">{{ post.title }}</a>
    </span>
    <span class="text-sm mb-4">Posted by <span class="fw-semibold">{{ post.author }}</span> on {{ post.published_at|date:"F j, Y" }}</span>
    <span class="text-base mb-4">{{ post.excerpt }}</span>
    <span class="text-sm fw-semibold"><a href="{{ post.get_absolute_url }}">Read More</a></span>
</div>

{% extends "databruce/narrow_layout.html" %}
{% load i18n %}
{% block title %}
    {{ title }}
{% endblock title %}
{% block content %}
    <div class="col-12 col-lg-8">
        <div class="text-2xl text-nowrap mb-3">
            <a href="{% url 'blog' %}">Blog</a> &gt; Categories
        </div>
        <div class="text-sm">
            <ul>
                {% for category in categories %}
                    <li>
                        <a href="{% url "blog_post_category" slug=category.slug %}">{{ category.slug }}</a> -  {{ category.post_categories.count }}
                    </li>
                {% endfor %}
            </ul>
        </div>
    </div>
{% endblock content %}

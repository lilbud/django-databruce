{% extends "databruce/narrow_layout.html" %}
{% block title %}
  {{ title }}
{% endblock title %}
{% block content %}
  <div class="col">
    <div class="text-2xl text-nowrap mb-2">Setlist Notes Search</div>
    <div class="text-base text-nowrap mb-3">
      <span class="fw-semibold">Query:</span>
      {{ query }}
    </div>
    <div class="card">
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover display nowrap" id="table">
            <thead>
              <tr>
                <th class="all">Event</th>
                <th class="min-tablet-l">Venue</th>
                <th class="min-tablet-l">Set</th>
                <th class="min-tablet-l">Song</th>
                <th class="min-tablet-l">Note</th>
              </tr>
            </thead>
          </table>
        </div>
      </div>
    </div>
  </div>
  <script>
    $(document).ready(function () {
      new DataTable('#table', {
        layout: getDatatableLayout({category: false}),
        serverSide: true,
        processing: true,
        scrollY: '60vh',
        ajax: {
          'url': '/api/v1/setlist_notes/?note={{ query }}&format=custom',
        },
        columnDefs: [
          { targets: '_all', className: 'text-wrap text-xs', defaultContent: '' },
        ],
        columns: [
          {
            'data': 'event',
            'name': 'event__event_id, event__early_late',
            'className': 'text-nowrap all',
            'width': '8rem',
            'type': 'text',
            'render': function (data, type, row, meta) {
              if (type === 'display' && data) {
                return '<a href="/events/' + data.event_id + '">' + data.date.display_day + '</a>';
              }
            },
          },
          {
            'data': 'event.venue',
            'name': 'event__venue__name, event__venue__detail',
            'className': 'text-nowrap all',
            'width': '12rem',
            'render': function (data, type, row, meta) {
              if (type === 'display' && data) {
                return '<a href="/venues/' + data.id + '">' + data.name + '</a>';
              }
            },
          },
          {
            'data': 'setlist.set_name',
            'name': 'setlist__set_name',
            'className': 'text-nowrap',
            'width': '8rem',
          },
          {
            'data': 'setlist.song',
            'name': 'setlist__song__name',
            'className': 'text-nowrap',
            'width': '12rem',
            'render': function (data, type, row, meta) {
              if (type === 'display' && data) {
                return '<a href="/songs/' + data.id + '">' + data.name + '</a>';
              }
            },
          },
          {'data': 'note', 'name': 'note', 'className': 'text-nowrap', 'width': '15rem'},
        ]
      })
    })
  </script>
{% endblock content %}

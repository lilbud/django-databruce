{% extends "databruce/narrow_layout.html" %}
{% block title %}
{% endblock title %}
{% block content %}
  <div class="col-12">
    <div class="row mb-3">
      {% block info_row %}
      {% endblock info_row %}
    </div>
    <div class="row">
      <div class="col">
        <div class="card">
          <div class="card-body px-0">
            <div class="table-responsive">
              <table class="table table-hover display"
                     id="{% spaceless %}{% block table_id %}{% endblock table_id %}{% endspaceless %}">
                {% block table %}
                {% endblock table %}
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  {% block scripts %}
  {% endblock scripts %}
{% endblock content %}

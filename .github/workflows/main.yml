name: Deploy Django to DigitalOcean

on:
  workflow_dispatch:

  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v6

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          request_pty: true
          script: |
            # Move into the application directory
            cd /home/lilbud/django-databruce

            # 1. Force Git to run completely non-interactively
            export GIT_TERMINAL_PROMPT=0
            export GIT_PAGER=cat

            # Pull the latest changes from GitHub
            git stash
            git fetch --all
            git reset --hard origin/main
            git stash drop

            echo "git fetch ran"

            # Activate the virtual environment
            source .venv/bin/activate

            # Stop Gunicorn
            sudo systemctl stop gunicorn gunicorn.socket
            
            # Remove Old Static
            rm -rf static/
            
            # Remove Local Settings If Present
            rm -rf databruce/config/local.py
            
            # Collect New Static
            ./manage.py collectstatic --noinput
            
            # Reload Gunicorn using systemd
            sudo systemctl restart gunicorn
